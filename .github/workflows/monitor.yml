name: Job Monitor

on:
#  schedule:
#    - cron: '7 * * * *'   # every hour at :07
  workflow_dispatch: {}    # manual trigger button

permissions:
  contents: write          # needed to commit seen_jobs.json back

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        id: run
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          JOB_POSTED_WITHIN: ${{ secrets.JOB_POSTED_WITHIN }}
        run: |
          python monitor.py 2>&1 | tee run.log
          # Capture company error count to surface in the summary
          if grep -qE "^\s*[0-9]+ error\(s\):" run.log; then
            errors=$(grep -E "^\s*[0-9]+ error\(s\):" run.log | head -1)
            echo "errors_line=$errors" >> $GITHUB_OUTPUT
          fi

      - name: Surface fetch errors in workflow summary
        if: always()
        run: |
          {
            echo "## Job Monitor Run"
            echo ""
            if [ -f run.log ]; then
              # Show the summary block from the bottom of the log
              echo '```'
              tail -n 40 run.log
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Persist seen-jobs cache
        if: success()
        run: |
          # Bail out gracefully if no seen_jobs.json was produced (shouldn't
          # happen, but don't fail the workflow if it does).
          if [ ! -f seen_jobs.json ]; then
            echo "No seen_jobs.json to persist — first run may have errored. Skipping."
            exit 0
          fi
          git config user.name  "job-monitor-bot"
          git config user.email "actions@github.com"
          git add seen_jobs.json
          git diff --quiet --cached || git commit -m "Update seen jobs [skip ci]"
          git push || echo "git push failed (likely no changes) — continuing"
